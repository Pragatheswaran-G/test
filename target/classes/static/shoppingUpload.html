<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        .body{
            background: #f4f6f9;
        }
        .formcontainer {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .upload-form {
            background: white;
            width: 450px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        h2 {
            text-align: center;
            margin-bottom: 15px;
            color: #333;
        }

        label {
            font-weight: bold;
            color: #444;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
            font-size: 15px;
        }

        input:focus,
        textarea:focus {
            border-color: #4CAF50;
        }

        textarea {
            resize: none;
            height: 100px;
        }

        input[type="file"] {
            border: none;
            padding: 0;
        }

        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background: #388e3c;
        }
    </style>
</head>

<body>
    <div class="heading">
        <h2>Add Product</h2>
    </div>
    <div class="formcontainer">
        <form class="upload-form">

            <label>Product Name</label>
            <input type="text" id="name">

            <label>Product Details</label>
            <textarea id="details"></textarea>

            <label>Price</label>
            <input type="number" id="price">

            <label>Quantity</label>
            <input type="number" id="quantity">

            <label>Product Image</label>
            <input type="file" id="image">

            <button type="button" onclick="uploadProduct()">Upload Product</button>

        </form>
    </div>
    <script src="./shopping.js">
        
    </script>
</body>

</html>
